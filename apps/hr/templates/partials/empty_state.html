{# Usage: {% include "partials/empty_state.html" with title="..." message="..." cta_url="..." cta_label="..." %} #}
<div class="hr-empty" role="status" aria-live="polite">
  <div class="hr-empty__icon">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="28" height="28">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
    </svg>
  </div>
  <h3 class="hr-empty__title">{{ title|default:"Nothing here yet" }}</h3>
  <p class="hr-empty__msg">{{ message|default:"Get started by creating your first record." }}</p>
  {% if cta_url %}
  <a href="{{ cta_url }}" class="btn btn-primary btn-sm">{{ cta_label|default:"Get started" }}</a>
  {% endif %}
</div>
