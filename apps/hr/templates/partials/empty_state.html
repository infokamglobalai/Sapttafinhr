{# Usage: {% include "partials/empty_state.html" with title="..." message="..." cta_url="..." cta_label="..." %} #}
<div class="empty-state text-center py-12 px-4">
  <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl mb-4" style="background: var(--ink-100); color: var(--ink-500);">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="w-7 h-7">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
    </svg>
  </div>
  <h3 class="text-base font-semibold mb-1">{{ title|default:"Nothing here yet" }}</h3>
  <p class="text-sm text-base-content/60 max-w-md mx-auto mb-4">{{ message|default:"Get started by creating your first record." }}</p>
  {% if cta_url %}
  <a href="{{ cta_url }}" class="btn btn-primary btn-sm">{{ cta_label|default:"Get started" }}</a>
  {% endif %}
</div>
