<div class="sidebar-unified__footer">
  <div class="dock-hub dock-hub--company-only" @click.outside="dockHubOpen = false">
    <button type="button" class="dock-hub-trigger"
      @click="dockHubOpen = !dockHubOpen"
      :aria-expanded="dockHubOpen"
      aria-haspopup="true"
      title="{% if tenant %}{{ tenant.name }}{% else %}Workspace{% endif %}">
      {% if tenant %}
      {% if tenant_logo_url %}
      <img src="{{ tenant_logo_url }}" alt="" class="dock-hub-logo">
      {% else %}
      <span class="dock-hub-initial" aria-hidden="true">{{ tenant.name|slice:":1"|upper }}</span>
      {% endif %}
      <span class="dock-hub-text">
        <span class="dock-hub-kicker">Your company</span>
        <span class="dock-hub-name">{{ tenant.name|truncatechars:22 }}</span>
      </span>
      {% else %}
      <span class="dock-hub-initial dock-hub-initial--saptta" aria-hidden="true">S</span>
      <span class="dock-hub-text">
        <span class="dock-hub-kicker">Workspace</span>
        <span class="dock-hub-name">Saptta HR</span>
      </span>
      {% endif %}
      <svg class="dock-hub-chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
        :class="{ 'is-open': dockHubOpen }">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>

    {% if tenant %}
    <div class="dock-hub-menu dock-hub-menu--info" x-show="dockHubOpen" x-transition.opacity.duration.120ms
      @click="dockHubOpen = false">
      <div class="dock-hub-menu-head" @click.stop>
        {% if tenant_logo_url %}
        <img src="{{ tenant_logo_url }}" alt="" class="dock-hub-menu-logo">
        {% else %}
        <span class="dock-hub-initial dock-hub-initial--lg">{{ tenant.name|slice:":1"|upper }}</span>
        {% endif %}
        <div class="dock-hub-menu-meta">
          <span class="dock-hub-menu-name">{{ tenant.name }}</span>
          <span class="dock-hub-menu-sub">{{ tenant.subdomain }}.workspace</span>
        </div>
      </div>
      {% if user.is_hr_admin %}
      <a href="{% url 'accounts:settings' %}?tab=company" class="dock-hub-item dock-hub-item--solo">
        <span class="dock-hub-item-text">
          <strong>Company settings</strong>
          <span>Logo, branding, workspace</span>
        </span>
      </a>
      {% endif %}
    </div>
    {% endif %}
  </div>
</div>
