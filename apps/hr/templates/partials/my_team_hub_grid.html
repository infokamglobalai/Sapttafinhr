{# Grouped launcher — My Team overview #}
<div class="my-space-hub my-space-hub--team">
  <div class="my-space-hub__head">
    <h2 class="my-space-hub__title">Everything in My Team</h2>
    <p class="my-space-hub__sub">Approvals and team tools — press <kbd>⌘K</kbd> to jump anywhere.</p>
  </div>
  <div class="my-space-hub__grid">
    {% for group in my_team_nav_groups %}
    <section class="my-space-hub__card" id="my-team-{{ group.id }}">
      <h3 class="my-space-hub__card-title">{{ group.label }}</h3>
      <p class="my-space-hub__card-summary">{{ group.summary }}</p>
      <ul class="my-space-hub__links">
        {% for item in group.items %}
        <li>
          <a href="{{ item.url }}" class="my-space-hub__link{% if item.is_active %} is-active{% endif %}">
            {{ item.label }}
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </a>
        </li>
        {% endfor %}
      </ul>
    </section>
    {% endfor %}
  </div>
</div>
