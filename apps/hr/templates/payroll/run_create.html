{% extends "base.html" %}
{% block page_title %}New Payroll Run{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'payroll:run_list' %}" class="btn btn-ghost btn-sm">← Back</a>
    <h2 class="text-xl font-bold">New Payroll Run</h2>
  </div>
  <div class="card">
    <div class="card-body">
      <div class="alert alert-info mb-4">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span class="text-sm">Review attendance &amp; leave readiness first, then run payroll for all active employees.</span>
      </div>
      <a href="{% url 'payroll:monthly_review' %}" class="btn btn-outline btn-sm w-full mb-4">Open pre-payroll review →</a>
      <form method="post" action="{% url 'payroll:run_create' %}">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4 mb-6">
          <div class="form-control">
            <label class="label"><span class="label-text font-medium">Year *</span></label>
            <select name="year" class="select select-bordered">
              <option value="2024" {% if today.year == 2024 %}selected{% endif %}>2024</option>
              <option value="2025" {% if today.year == 2025 %}selected{% endif %}>2025</option>
              <option value="2026" {% if today.year == 2026 %}selected{% endif %}>2026</option>
              <option value="2027" {% if today.year == 2027 %}selected{% endif %}>2027</option>
            </select>
          </div>
          <div class="form-control">
            <label class="label"><span class="label-text font-medium">Month *</span></label>
            <select name="month" class="select select-bordered">
              <option value="1"  {% if today.month == 1 %}selected{% endif %}>January</option>
              <option value="2"  {% if today.month == 2 %}selected{% endif %}>February</option>
              <option value="3"  {% if today.month == 3 %}selected{% endif %}>March</option>
              <option value="4"  {% if today.month == 4 %}selected{% endif %}>April</option>
              <option value="5"  {% if today.month == 5 %}selected{% endif %}>May</option>
              <option value="6"  {% if today.month == 6 %}selected{% endif %}>June</option>
              <option value="7"  {% if today.month == 7 %}selected{% endif %}>July</option>
              <option value="8"  {% if today.month == 8 %}selected{% endif %}>August</option>
              <option value="9"  {% if today.month == 9 %}selected{% endif %}>September</option>
              <option value="10" {% if today.month == 10 %}selected{% endif %}>October</option>
              <option value="11" {% if today.month == 11 %}selected{% endif %}>November</option>
              <option value="12" {% if today.month == 12 %}selected{% endif %}>December</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-full">
          Start Payroll Processing
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
