<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: #F5F1E8; margin: 0; padding: 24px; color: #1F2937; }
  .wrapper { max-width: 560px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08); }
  .header { background: linear-gradient(135deg, #6366f1 0%, #3730a3 100%); padding: 24px 28px; color: white; }
  .header h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .header p { margin: 4px 0 0; opacity: 0.9; font-size: 13px; }
  .body { padding: 28px; }
  .body h2 { margin: 0 0 12px; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: #0F172A; }
  .body p { margin: 0 0 14px; line-height: 1.6; font-size: 14.5px; color: #334155; }
  .cta { display: inline-block; padding: 11px 22px; background: linear-gradient(180deg, #6366f1, #4f46e5); color: white !important; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 14px; margin-top: 8px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
  .footer { padding: 18px 28px; background: #eef2ff; border-top: 1px solid #FED7AA; font-size: 12px; color: #92400E; text-align: center; }
  .footer a { color: #3730a3; text-decoration: none; }
</style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>{{ tenant.name }}</h1>
      <p>HRMS Notification</p>
    </div>
    <div class="body">
      <h2>{{ title }}</h2>
      {% if message %}<p>{{ message|linebreaksbr }}</p>{% endif %}
      {% if action_url %}<a class="cta" href="{{ site_url }}{{ action_url }}">View in HRMS →</a>{% endif %}
    </div>
    <div class="footer">
      Sent to {{ recipient.email }} · <a href="{{ site_url }}/auth/profile/">Manage notifications</a>
    </div>
  </div>
</body>
</html>
