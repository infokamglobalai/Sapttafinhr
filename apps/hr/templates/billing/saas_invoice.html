<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tax Invoice {{ invoice.number }}</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; color: #111827; margin: 0; padding: 24px; background: #f8fafc; }
    .sheet { max-width: 820px; margin: 0 auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 32px; }
    h1 { margin: 0 0 4px; font-size: 22px; }
    .muted { color: #6b7280; font-size: 13px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 24px 0; }
    .box { border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px 16px; }
    .box h3 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #6b7280; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { border: 1px solid #e5e7eb; padding: 10px 12px; text-align: left; font-size: 13px; }
    th { background: #f9fafb; }
    .r { text-align: right; }
    .total-row td { font-weight: 700; background: #f9fafb; }
    .toolbar { max-width: 820px; margin: 0 auto 16px; display: flex; gap: 10px; }
    .btn { display: inline-block; padding: 8px 14px; border-radius: 8px; text-decoration: none; font-size: 14px; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-outline { border: 1px solid #d1d5db; color: #111827; background: #fff; }
    @media print { .toolbar { display: none; } body { background: #fff; padding: 0; } .sheet { border: none; } }
  </style>
</head>
<body>
  <div class="toolbar">
    <a href="{% url 'accounts:settings' %}?tab=billing" class="btn btn-outline">← Back to billing</a>
    <a href="{% url 'accounts:invoice_pdf' invoice_id=invoice_id %}" class="btn btn-primary">Download PDF</a>
    <button type="button" class="btn btn-outline" onclick="window.print()">Print</button>
  </div>
  {% include "billing/partials/saas_invoice_body.html" %}
</body>
</html>
