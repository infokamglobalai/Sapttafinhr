{% extends "base.html" %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, #EFF6FF 0%, #BFDBFE 100%);">
  <div style="width: 100%; max-width: 420px; background: white; border-radius: 18px; box-shadow: 0 20px 50px -10px rgba(194, 65, 12, 0.18); padding: 36px;">
    <a href="{% url 'accounts:employee_login' %}" style="font-size: 13px; color: var(--ink-500); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 24px;">← Back to login</a>
    <h2 style="font-size: 24px; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 6px;">Forgot your password?</h2>
    <p style="font-size: 13.5px; color: var(--ink-500); margin-bottom: 24px;">Enter your email and we&rsquo;ll send you a link to set a new one.</p>

    {% if messages %}{% for m in messages %}<div class="alert alert-{% if m.tags == 'error' %}error{% else %}success{% endif %}" style="margin-bottom: 14px;"><span>{{ m }}</span></div>{% endfor %}{% endif %}

    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom: 18px;">
        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">Work email</label>
        <input type="email" name="email" required autofocus placeholder="you@company.com" class="input input-bordered" style="width: 100%;">
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px;">Send reset link</button>
    </form>
  </div>
</div>
{% endblock %}
