{# ⌘K command palette — quick links + filter #}
{% if command_palette_links %}
{{ command_palette_links|json_script:"command-palette-data" }}
<div
  id="command-palette-root"
  class="cmd-palette-root"
  x-data="commandPalette()"
  x-cloak
  @keydown.window="onGlobalKeydown($event)"
>
  <div
    x-show="open"
    x-transition:enter="cmd-palette-enter"
    x-transition:leave="cmd-palette-leave"
    class="cmd-palette-overlay"
    @click.self="close()"
    aria-hidden="true"
  ></div>
  <div
    x-show="open"
    x-transition
    class="cmd-palette"
    role="dialog"
    aria-modal="true"
    aria-label="Command palette"
    @click.outside="close()"
  >
    <div class="cmd-palette__search-row">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input
        type="text"
        class="cmd-palette__input"
        placeholder="Jump to a page or search…"
        x-model="query"
        x-ref="paletteInput"
        @keydown.escape.prevent="close()"
        @keydown.arrow-down.prevent="move(1)"
        @keydown.arrow-up.prevent="move(-1)"
        @keydown.enter.prevent="goSelected()"
      >
      <kbd class="cmd-palette__esc">esc</kbd>
    </div>
    <ul class="cmd-palette__list" role="listbox">
      <template x-for="(item, idx) in filtered" :key="item.url + item.label">
        <li>
          <a
            :href="item.url"
            class="cmd-palette__item"
            :class="{ 'is-active': idx === selected }"
            @mouseenter="selected = idx"
          >
            <span class="cmd-palette__item-label" x-text="item.label"></span>
            <span class="cmd-palette__item-group" x-text="item.group"></span>
          </a>
        </li>
      </template>
      <li x-show="filtered.length === 0" class="cmd-palette__empty">No matches — try another keyword</li>
    </ul>
    <p class="cmd-palette__foot">
      <span>↑↓ navigate</span>
      <span>↵ open</span>
      <span>esc close</span>
    </p>
  </div>
</div>
{% endif %}
