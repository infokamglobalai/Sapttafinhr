{% extends "base.html" %}
{% block page_title %}Company Directory{% endblock %}
{% block content %}
<div class="hr-page-header">
  <div class="hr-page-header__main">
    <h1 class="hr-page-header__title">Company Directory</h1>
    <p class="hr-page-header__sub">Find colleagues by name, nickname, email, or department.</p>
  </div>
</div>

<form method="get" class="people-filter-bar mb-4">
  <input type="search" name="q" value="{{ search }}" class="input input-bordered input-sm flex-1 min-w-[200px]" placeholder="Name, nickname, email, department…" aria-label="Search colleagues">
  <select name="department" class="select select-bordered select-sm">
    <option value="">All departments</option>
    {% for dept in departments %}
    <option value="{{ dept.pk }}" {% if selected_dept == dept.pk|stringformat:"s" %}selected{% endif %}>{{ dept.name }}</option>
    {% endfor %}
  </select>
  <button type="submit" class="btn btn-primary btn-sm">Search</button>
</form>

{% include "employees/partials/employee_cards.html" with directory_mode=True %}
{% endblock %}
