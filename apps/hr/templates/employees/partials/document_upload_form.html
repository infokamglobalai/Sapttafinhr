<h3 class="font-semibold mb-4">Upload Document</h3>
<form method="post" action="{% url 'employees:document_upload' employee.pk %}" enctype="multipart/form-data"
      hx-post="{% url 'employees:document_upload' employee.pk %}"
      hx-target="#document-list" hx-swap="innerHTML"
      hx-encoding="multipart/form-data">
  {% csrf_token %}
  <div class="form-control mb-3"><label class="label"><span class="label-text">Document Type</span></label>{{ form.document_type }}</div>
  <div class="form-control mb-3"><label class="label"><span class="label-text">Document Name</span></label>{{ form.document_name }}</div>
  <div class="form-control mb-3"><label class="label"><span class="label-text">File</span></label><input type="file" name="file" class="file-input file-input-bordered w-full" required></div>
  <div class="form-control mb-4"><label class="label"><span class="label-text">Expiry Date</span></label>{{ form.expiry_date }}</div>
  <button type="submit" class="btn btn-primary btn-sm w-full">Upload</button>
</form>
