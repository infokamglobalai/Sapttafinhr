<div class="card bg-base-100 shadow overflow-x-auto">
  <table class="table table-sm">
    <thead><tr><th>Name</th><th>Parent</th><th>Cost Center</th><th>Status</th></tr></thead>
    <tbody>
      {% for dept in departments %}
      <tr>
        <td class="font-medium">{{ dept.name }}</td>
        <td>{{ dept.parent.name|default:"—" }}</td>
        <td class="font-mono text-xs">{{ dept.cost_center_code|default:"—" }}</td>
        <td><span class="badge badge-sm {% if dept.is_active %}badge-success{% else %}badge-ghost{% endif %}">{% if dept.is_active %}Active{% else %}Inactive{% endif %}</span></td>
      </tr>
      {% empty %}
      <tr><td colspan="4" class="text-center py-6 text-base-content/40">No departments yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
