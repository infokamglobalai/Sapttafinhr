<div class="card hr-table-wrap">
  <table class="table table-sm">
    <thead><tr><th>Name</th><th>Level</th><th>Grade</th><th>Status</th></tr></thead>
    <tbody>
      {% for d in designations %}
      <tr>
        <td class="font-medium">{{ d.name }}</td>
        <td>{{ d.level|default:"—" }}</td>
        <td class="font-mono text-xs">{{ d.grade|default:"—" }}</td>
        <td><span class="badge badge-sm {% if d.is_active %}badge-success{% else %}badge-ghost{% endif %}">{% if d.is_active %}Active{% else %}Inactive{% endif %}</span></td>
      </tr>
      {% empty %}
      <tr><td colspan="4" class="text-center py-6 text-base-content/40">No designations yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
