{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} · HRMS Superadmin{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}" style="display:inline-flex;align-items:center;gap:10px;">
    <img src="{% static 'images/logo.jpeg' %}" alt="Saptta" style="height:28px;width:auto;object-fit:contain;">
    <span>HRMS · Platform Admin</span>
  </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/admin-theme.css' %}">
{% endblock %}

{% block nav-global %}{% endblock %}
