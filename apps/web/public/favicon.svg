<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="orangeGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF6D00"/>
    </linearGradient>
  </defs>
  <!-- Beautiful subtle ambient background glow -->
  <circle cx="64" cy="64" r="54" fill="#0A1128" opacity="0.95"/>
  <!-- The brand's iconic glowing orange triangle -->
  <polygon points="64,24 104,98 24,98" fill="url(#orangeGrad)" filter="url(#glow)"/>
</svg>
