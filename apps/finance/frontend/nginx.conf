server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed assets aggressively; serve index.html for all other paths (SPA).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
