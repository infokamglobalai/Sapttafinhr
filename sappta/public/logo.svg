<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" fill="none">
  <defs>
    <filter id="oGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bgBlur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <linearGradient id="oGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF4500"/>
    </linearGradient>
  </defs>
  <!-- Blue ambient glow -->
  <ellipse cx="210" cy="60" rx="200" ry="55" fill="#020B5B" opacity="0.8" filter="url(#bgBlur)"/>
  <!-- SAPTTA text background letterforms -->
  <text x="8" y="102" font-family="Inter,Arial,sans-serif" font-size="96" font-weight="900" fill="#050C3D" letter-spacing="-3">SAPTTA</text>
  <!-- Orange halo -->
  <ellipse cx="100" cy="72" rx="38" ry="34" fill="#FF6D00" opacity="0.3" filter="url(#bgBlur)"/>
  <!-- Large orange triangle -->
  <polygon points="100,22 142,98 58,98" fill="url(#oGrad)" filter="url(#oGlow)"/>
  <!-- Purple halo -->
  <ellipse cx="318" cy="74" rx="22" ry="20" fill="#6600CC" opacity="0.4" filter="url(#bgBlur)"/>
  <!-- Small purple triangle -->
  <polygon points="318,48 340,90 296,90" fill="#8A2BE2" filter="url(#pGlow)" opacity="0.95"/>
</svg>
