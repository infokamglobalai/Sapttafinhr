# ─────────────────────────────────────────────────────────────────────────
# Saptta PRODUCTION stack. Differs from docker-compose.yml (dev) by:
#   - gunicorn (not runserver), DEBUG=False, config.settings.prod
#   - no source-code bind mounts (images are immutable artifacts)
#   - front door builds + serves the SPA statically over TLS
#   - restart: always; secrets from .env.prod
#
# Bring up:
#   cp .env.prod.example .env.prod   # fill in real values
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# Migrations run automatically on fin/hr start (see commands).
# ─────────────────────────────────────────────────────────────────────────
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  fin-backend:
    build:
      context: ./apps/finance/backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_SECRET_KEY: ${FIN_SECRET_KEY}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      EMAIL_BACKEND: ${EMAIL_BACKEND}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      FIELD_ENCRYPTION_KEY: ${HR_FIELD_ENCRYPTION_KEY}
      MFA_REQUIRED: ${MFA_REQUIRED:-True}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-True}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      HR_INTERNAL_BASE_URL: http://hr-backend:8000
      SENTRY_DSN: ${FIN_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      EINVOICE_MODE: ${EINVOICE_MODE:-STUB}
      EWB_MODE: ${EWB_MODE:-STUB}
      NIC_IRP_BASE_URL: ${NIC_IRP_BASE_URL:-}
      NIC_IRP_CLIENT_ID: ${NIC_IRP_CLIENT_ID:-}
      NIC_IRP_CLIENT_SECRET: ${NIC_IRP_CLIENT_SECRET:-}
      NIC_IRP_GSTIN: ${NIC_IRP_GSTIN:-}
      EWB_BASE_URL: ${EWB_BASE_URL:-}
      EWB_USERNAME: ${EWB_USERNAME:-}
      EWB_PASSWORD: ${EWB_PASSWORD:-}
      ZATCA_MODE: ${ZATCA_MODE:-STUB}
      ZATCA_BASE_URL: ${ZATCA_BASE_URL:-}
      ZATCA_CLIENT_ID: ${ZATCA_CLIENT_ID:-}
      ZATCA_CLIENT_SECRET: ${ZATCA_CLIENT_SECRET:-}
      PEPPOL_MODE: ${PEPPOL_MODE:-STUB}
      PEPPOL_BASE_URL: ${PEPPOL_BASE_URL:-}
      PEPPOL_API_KEY: ${PEPPOL_API_KEY:-}
      SAAS_VENDOR_GSTIN: ${SAAS_VENDOR_GSTIN:-}
      SAAS_VENDOR_STATE_CODE: ${SAAS_VENDOR_STATE_CODE:-27}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: sh -c "python manage.py migrate_schemas --shared --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile -"

  fin-worker:
    build:
      context: ./apps/finance/backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_SECRET_KEY: ${FIN_SECRET_KEY}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      EMAIL_BACKEND: ${EMAIL_BACKEND}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      SENTRY_DSN: ${FIN_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      # The async signup provisioning task runs in this worker — without the HR
      # creds it silently skips HR provisioning, so new HR signups get no HR
      # workspace (→ "Couldn't open Saptta HR"). Must match fin-backend/hr-backend.
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      HR_INTERNAL_BASE_URL: http://hr-backend:8000
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      # Mount a durable host path / network volume for off-box backup storage.
      - ${BACKUP_DIR:-./backups}:/backups
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: celery -A config worker -B -l info

  hr-backend:
    build:
      context: ./apps/hr
      dockerfile: Dockerfile
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: hrms.settings.production
      SECRET_KEY: ${HR_SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${HR_ALLOWED_HOSTS}
      DB_NAME: ${HR_POSTGRES_DB:-saptta_hr}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      FIELD_ENCRYPTION_KEY: ${HR_FIELD_ENCRYPTION_KEY}
      MFA_REQUIRED: ${MFA_REQUIRED:-True}
      SUPERADMIN_DOMAIN: ${HR_SUPERADMIN_DOMAIN}
      TENANT_DOMAIN: ${HR_TENANT_DOMAIN}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      SENTRY_DSN: ${HR_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      HR_PUBLIC_BASE_URL: https://${HR_SUPERADMIN_DOMAIN:-hr.saptta.com}
      PLATFORM_BASE_URL: ${FRONTEND_BASE_URL:-https://app.saptta.com}
      EMAIL_BACKEND: ${HR_EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${HR_EMAIL_HOST:-}
      EMAIL_PORT: ${HR_EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${HR_EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${HR_EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${HR_EMAIL_USE_TLS:-True}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn hrms.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile -"

  hr-worker:
    build:
      context: ./apps/hr
      dockerfile: Dockerfile
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: hrms.settings.production
      SECRET_KEY: ${HR_SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${HR_ALLOWED_HOSTS}
      DB_NAME: ${HR_POSTGRES_DB:-saptta_hr}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      FIELD_ENCRYPTION_KEY: ${HR_FIELD_ENCRYPTION_KEY}
      MFA_REQUIRED: ${MFA_REQUIRED:-True}
      SUPERADMIN_DOMAIN: ${HR_SUPERADMIN_DOMAIN}
      TENANT_DOMAIN: ${HR_TENANT_DOMAIN}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      EMAIL_BACKEND: ${HR_EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${HR_EMAIL_HOST:-}
      EMAIL_PORT: ${HR_EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${HR_EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${HR_EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${HR_EMAIL_USE_TLS:-True}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      SENTRY_DSN: ${HR_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      HR_PUBLIC_BASE_URL: https://${HR_SUPERADMIN_DOMAIN:-hr.saptta.com}
      PLATFORM_BASE_URL: ${FRONTEND_BASE_URL:-https://app.saptta.com}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: celery -A hrms worker --beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  finance-web:
    build:
      context: ./apps/finance/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_PLATFORM_BASE_URL: ${VITE_FIN_PLATFORM_BASE_URL}
    restart: always
    depends_on:
      - fin-backend

  frontdoor:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontdoor
      args:
        VITE_PLATFORM_API_BASE_URL: ${VITE_PLATFORM_API_BASE_URL}
        VITE_TENANT_API_BASE_URL: ${VITE_TENANT_API_BASE_URL}
        VITE_HR_BASE_URL: ${VITE_HR_BASE_URL}
        VITE_FINANCE_APP_BASE_URL: ${VITE_FINANCE_APP_BASE_URL}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount your TLS cert + key here (e.g. from certbot/Let's Encrypt).
      - ${TLS_CERT_DIR:-/etc/letsencrypt/live/saptta.com}/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ${TLS_CERT_DIR:-/etc/letsencrypt/live/saptta.com}/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      - fin-backend
      - hr-backend
      - finance-web

volumes:
  pgdata:
  certbot-webroot:
