# ─────────────────────────────────────────────────────────────────────────
# Saptta — unified dev stack (one command brings up the whole platform).
#
#   nginx (the front door) ........ http://localhost:8080
#     ├── /            → web (SPA: marketing + app shell)
#     ├── /api/v1      → fin-backend  (auth/saas on localhost; tenant on
#     │                                {workspace}.localhost)
#     └── /hr/         → hr-backend   (existing HR pages, embedded)
#
# Bring up:   docker compose up --build
# HR demo data is auto-seeded on hr-backend start (seed_demo_data).
# Re-seed:     docker compose exec hr-backend python manage.py seed_demo_data --subdomain acme
# Seed FIN:    docker compose exec fin-backend python manage.py bootstrap_dev
#
# Then open http://localhost:8080  and sign in with the FIN dev user
# (admin@acme.test / admin12345 after bootstrap_dev).
#
# NOTE: add `127.0.0.1 acme.localhost` to your hosts file if your OS does not
# already resolve *.localhost (most Linux/macOS do; Windows may need it).
# ─────────────────────────────────────────────────────────────────────────
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finsaptta}
      POSTGRES_USER: ${POSTGRES_USER:-finsaptta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsaptta}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finsaptta}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FIN (fin-saptta): django-tenants + DRF + JWT ──────────────────────
  fin-backend:
    build:
      context: ./apps/finance/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Optional: hit FIN directly from host (e.g. Vite on :5173 with .env.local → :8000).
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ${FIN_SECRET_KEY:-insecure-dev-key-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,.localhost,fin-backend,saptta.com,.saptta.com}
      POSTGRES_DB: ${POSTGRES_DB:-finsaptta}
      POSTGRES_USER: ${POSTGRES_USER:-finsaptta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsaptta}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      # nginx (:8080) and local Vite (:5173) both call this API cross-origin in dev.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,https://saptta.com,https://www.saptta.com}
      # Shared with hr-backend so FIN can mint HR SSO handoff tokens.
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET:-dev-sso-shared-secret-change-me}
      HR_INTERNAL_BASE_URL: http://hr-backend:8000
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./apps/finance/backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate_schemas --shared &&
             python manage.py migrate_schemas --tenant &&
             python manage.py bootstrap_dev &&
             python manage.py runserver 0.0.0.0:8000"

  fin-worker:
    build:
      context: ./apps/finance/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_DB: ${POSTGRES_DB:-finsaptta}
      POSTGRES_USER: ${POSTGRES_USER:-finsaptta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsaptta}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      BACKUP_DIR: /backups
    volumes:
      - ./apps/finance/backend:/app
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -B -l info

  # ── HR (saptta HR): row-level tenancy, server-rendered pages ──────────
  # Dev uses SQLite (its development settings) for a zero-extra-DB demo.
  hr-backend:
    build:
      context: ./apps/hr
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: hrms.settings.development
      SECRET_KEY: ${HR_SECRET_KEY:-insecure-dev-hr-key-change-me}
      DEBUG: ${DJANGO_DEBUG:-True}
      ALLOWED_HOSTS: ${HR_ALLOWED_HOSTS:-localhost,127.0.0.1,hr-backend,saptta.com,.saptta.com}
      # DB vars expected by python-decouple in HR settings
      DB_NAME: ${POSTGRES_DB:-finsaptta}
      DB_USER: ${POSTGRES_USER:-finsaptta}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-finsaptta}
      DB_HOST: db
      DB_PORT: "5432"
      # HR resolves the tenant from the logged-in user when host is localhost.
      SUPERADMIN_DOMAIN: ${SUPERADMIN_DOMAIN:-localhost}
      TENANT_DOMAIN: ${TENANT_DOMAIN:-localhost}
      # Front door for cross-product links (Back to products / logout / login).
      # Without this, dev settings default to native Vite (:5173), which isn't up
      # in the Docker-only flow, breaking those links.
      PLATFORM_BASE_URL: ${PLATFORM_BASE_URL:-http://localhost:8080}
      # HR's own public address through the front door. Shareable links (employee
      # invite + sign-in) are built from this. Without it dev settings default to
      # the native-Vite host (127.0.0.1:8001), which nothing listens on in the
      # Docker-only flow — producing dead invite links.
      HR_PUBLIC_BASE_URL: ${HR_PUBLIC_BASE_URL:-http://hr.localhost:8080}
      FIELD_ENCRYPTION_KEY: ${HR_FIELD_ENCRYPTION_KEY:?set HR_FIELD_ENCRYPTION_KEY in .env (Fernet key)}
      # Same value as fin-backend so HR can verify FIN-minted SSO tokens.
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET:-dev-sso-shared-secret-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./apps/hr:/app
    depends_on:
      db:
        condition: service_healthy
    # Override the prod gunicorn CMD: migrate, seed the demo tenant/admin
    # (idempotent — needed so FIN's SSO handoff finds a matching HR user), then
    # run the dev server.
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_dummy_login &&
             python manage.py seed_demo_data --subdomain acme --skip-login &&
             python manage.py runserver 0.0.0.0:8000"

  # ── Marketing site + auth + product switcher (NOT the products) ───────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # All API traffic flows through the nginx front door.
      VITE_PLATFORM_API_BASE_URL: ${VITE_PLATFORM_API_BASE_URL:-http://localhost:8080/api/v1}
      VITE_TENANT_API_BASE_URL: ${VITE_TENANT_API_BASE_URL:-http://finance.localhost:8080/api/v1}
      VITE_DEFAULT_WORKSPACE: acme
      VITE_HR_BASE_URL: ${VITE_HR_BASE_URL:-http://hr.localhost:8080}
      # Where to hand off into the REAL products (per workspace).
      VITE_FINANCE_APP_BASE_URL: ${VITE_FINANCE_APP_BASE_URL:-http://finance.localhost:8080}
    volumes:
      # Mount at /usr/src/app (not /app) so the SPA's "/app" route doesn't collide
      # with the working dir in Vite's dev server. See apps/web/Dockerfile.
      - ./apps/web:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # ── REAL Finance product (apps/finance/frontend) ──────────────────────
  # Served at the ROOT of the tenant host ({workspace}.localhost:8080/); its API
  # is same-origin at /api/v1, where django-tenants picks the schema from the
  # subdomain. Marketing/auth stays on the bare localhost host.
  finance-web:
    build:
      context: ./apps/finance/frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api/v1   # same-origin on whatever tenant host
      VITE_PLATFORM_BASE_URL: ${VITE_PLATFORM_BASE_URL:-http://localhost:8080}
    volumes:
      - ./apps/finance/frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── The front door ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - finance-web
      - fin-backend
      - hr-backend

volumes:
  pgdata:
  backups:
