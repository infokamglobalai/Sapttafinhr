name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: type-check + production build ──────────────────────────────
  web:
    name: web (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  # ── FIN backend: Django checks + pytest (Postgres service) ───────────────
  fin-backend:
    name: fin-backend (check + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/finance/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: finsaptta
          POSTGRES_USER: finsaptta
          POSTGRES_PASSWORD: finsaptta
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U finsaptta"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ci-test-secret-key-32-bytes-minimum-aaaaaaaa
      POSTGRES_DB: finsaptta
      POSTGRES_USER: finsaptta
      POSTGRES_PASSWORD: finsaptta
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/finance/backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Django system check
        run: python manage.py check
      - name: Migrations are in sync (no missing makemigrations)
        run: python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: pytest -q

  # ── Finance frontend: type-check + production build ─────────────────────
  finance-frontend:
    name: finance-frontend (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/finance/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/finance/frontend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1
          VITE_PLATFORM_BASE_URL: https://app.example.com

  # ── HR backend: Django check (SQLite dev settings, no services needed) ───
  hr-backend:
    name: hr-backend (check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/hr
    env:
      DJANGO_SETTINGS_MODULE: hrms.settings.development
      SECRET_KEY: ci-test-secret-key-32-bytes-minimum-bbbbbbbb
      DEBUG: "True"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/hr/requirements.txt
      - name: System deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 \
            libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev libcairo2
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate a Fernet key for the check
        run: echo "FIELD_ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"
      - name: Django system check
        run: python manage.py check
