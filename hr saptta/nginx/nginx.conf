upstream django {
    server 127.0.0.1:8000;
}

# Wildcard subdomain — all *.yourbrand.com → Django
server {
    listen 80;
    server_name *.yourbrand.com yourbrand.com;

    # Let Cloudflare handle SSL — if terminating SSL at nginx, add ssl config here
    client_max_body_size 25M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        # In production, serve from DO Spaces (CDN). This is local fallback for dev.
        alias /app/media/;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }
}
