# ─────────────────────────────────────────────────────────────────────────
# Saptta COOLIFY front door — HTTP only (Coolify handles TLS), built SPA served statically, APIs proxied.
# ─────────────────────────────────────────────────────────────────────────

upstream fin_backend  { server fin-backend:8000; }
upstream hr_backend   { server hr-backend:8000; }
upstream finance_web  { server finance-web:80; }

server_names_hash_bucket_size 128;

# ── HR host: hr.saptta.com → HR backend ──────────────────────────────────
server {
    listen 80;
    server_name hr.saptta.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://hr_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy
            "frame-ancestors 'self' https://app.saptta.com" always;
    }
}

# ── App host: app.saptta.com + saptta.com → Marketing SPA + public API ────
server {
    listen 80;
    server_name app.saptta.com saptta.com www.saptta.com;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.unsplash.com https://images.unsplash.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com; object-src 'none';" always;

    client_max_body_size 25m;
    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host app.saptta.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/(admin|api/schema|api/docs)/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host app.saptta.com;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / { try_files $uri /index.html; }
}

# ── Wildcard Tenant host: *.saptta.com → Finance Frontend + Tenant API ─────
server {
    listen 80;
    server_name *.saptta.com;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.unsplash.com https://images.unsplash.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com; object-src 'none';" always;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://finance_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
