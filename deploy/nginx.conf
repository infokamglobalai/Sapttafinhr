# ─────────────────────────────────────────────────────────────────────────
# Saptta unified front door (dev).  All on :8080.
#
#   http://localhost:8080/            → SPA (marketing + app shell)
#   http://localhost:8080/api/v1/...  → FIN backend, PUBLIC schema (auth+saas)
#   http://hr.localhost:8080/...      → HR backend (its existing pages)
#   http://{ws}.localhost:8080/api/v1 → FIN backend, TENANT schema for {ws}
#   http://{ws}.localhost:8080/       → SPA (deep links)
#
# Why hosts, not paths:
#   • django-tenants (FIN) selects the Postgres schema from the Host subdomain.
#     Shared apps (auth/saas) live in the public schema, so they're served from
#     the bare `localhost`; tenant resources need `{ws}.localhost`. This mirrors
#     the platform/tenant split in the SPA's src/lib/api.ts.
#   • HR is server-rendered and emits ROOT-relative URLs (/employees, /auth…),
#     so it gets its own host `hr.localhost` — no fragile path rewriting. We pass
#     Host: localhost upstream so HR's dev middleware resolves the tenant from
#     the logged-in user.
#
# Exact server_names (hr.localhost, localhost) take precedence over the regex
# tenant host, so ordering between blocks does not matter to nginx.
# ─────────────────────────────────────────────────────────────────────────

upstream fin_backend { server fin-backend:8000; }
upstream hr_backend  { server hr-backend:8000; }
upstream spa         { server web:5173; }          # marketing + auth + switcher
upstream finance_web { server finance-web:5173; }  # the REAL Finance product

# Docker embeds DNS at 127.0.0.11. Resolve upstream hostnames at request time
# so nginx does not keep a stale IP after `docker compose up --build` recreates
# backends (otherwise /api/v1/auth/login/ returns 502 until nginx is restarted).
resolver 127.0.0.11 valid=10s ipv6=off;

server_names_hash_bucket_size 64;

# ── HR host: everything → HR backend (Host forced to localhost) ──────────
server {
    listen 80;
    server_name hr.localhost;
    client_max_body_size 25m;

    location / {
        set $hr_upstream hr-backend:8000;
        proxy_pass http://$hr_upstream;
        proxy_set_header Host localhost;             # HR dev → user's tenant
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HR ships X-Frame-Options: DENY (correct for the open internet) which
        # would block the SPA's HR-workspace iframe. We are the only ingress to
        # HR, so strip DENY and instead allow exactly our front door to frame it
        # via CSP frame-ancestors. Nothing else can reach HR to abuse this.
        proxy_hide_header X-Frame-Options;
        # CSP: frame-ancestors keeps HR frameable only by our front door; the
        # object-src/base-uri directives harden plugin-XSS and base-tag injection
        # without restricting script/style sources (so inline scripts still run).
        # (Django's SecurityMiddleware already emits nosniff + Referrer-Policy;
        # only the CSP is added here to avoid duplicate headers.)
        add_header Content-Security-Policy
            "object-src 'none'; base-uri 'self'; frame-ancestors 'self' http://localhost:8080 http://*.localhost:8080" always;
    }
}

# ── Tenant host: {workspace}.localhost → REAL Finance app + tenant API ───
# The actual Finance product (apps/finance/frontend) is served at root here;
# its API is same-origin at /api/ and django-tenants resolves the schema from
# the subdomain Host. (Marketing/auth lives on the bare localhost host below.)
server {
    listen 80;
    server_name finance.localhost ~^(?<workspace>[a-z0-9-]+)\.localhost$;
    client_max_body_size 25m;

    location /api/ {
        set $fin_upstream fin-backend:8000;
        proxy_pass http://$fin_upstream;
        proxy_set_header Host $host;                 # e.g. acme.localhost
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cache preflight responses for 1 hour to cut OPTIONS round-trips.
        add_header Access-Control-Max-Age 3600 always;
    }

    location ~ ^/(admin|api/schema|api/docs)/ {
        set $fin_upstream fin-backend:8000;
        proxy_pass http://$fin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $finance_upstream finance-web:5173;
        proxy_pass http://$finance_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # vite HMR websocket
        proxy_set_header Connection "upgrade";
        # Non-script-restricting hardening (safe for the SPA; no frame-ancestors
        # here so the platform can still embed the product).
        add_header Content-Security-Policy "object-src 'none'; base-uri 'self'" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }
}

# ── Bare host: localhost → SPA + FIN public API ──────────────────────────
server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;
    client_max_body_size 25m;

    # FIN PUBLIC schema (auth + saas). Host forced to localhost.
    location /api/ {
        set $fin_upstream fin-backend:8000;
        proxy_pass http://$fin_upstream;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Max-Age 3600 always;
    }

    # HR mobile JSON API — proxied so the app can use one base URL (localhost:8080).
    location /api/mobile/ {
        set $hr_upstream hr-backend:8000;
        proxy_pass http://$hr_upstream;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Max-Age 3600 always;
    }

    # NOTE: `/superadmin` is a SPA route (React), NOT a Django page — it must fall
    # through to `location /` below. Only Django's own admin/schema/docs proxy here.
    location ~ ^/(admin|api/schema|api/docs)/ {
        set $fin_upstream fin-backend:8000;
        proxy_pass http://$fin_upstream;
        proxy_set_header Host localhost;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $spa_upstream web:5173;
        proxy_pass http://$spa_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # vite HMR websocket
        proxy_set_header Connection "upgrade";
        add_header Content-Security-Policy "object-src 'none'; base-uri 'self'" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }
}
