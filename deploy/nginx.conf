# ─────────────────────────────────────────────────────────────────────────
# Saptta unified front door (dev). All on :8080.
#
#   http://localhost:8080/            → SPA (marketing, auth & unified dashboard)
#   http://localhost:8080/api/v1/...  → FIN backend (resolves tenant via X-Tenant header)
#   http://localhost:8080/employees   → HR backend (proxied direct path)
#
# ─────────────────────────────────────────────────────────────────────────

upstream fin_backend { server fin-backend:8000; }
upstream hr_backend  { server hr-backend:8000; }
upstream spa         { server web:5173; }          # unified marketing + auth + dashboard SPA

server_names_hash_bucket_size 64;

# ── Unified Single-Domain Server ─────────────────────────────────────────
server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;
    client_max_body_size 25m;

    # 1. API requests (both platform and tenant are routed here, resolved by CustomTenantMiddleware)
    location /api/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Max-Age 3600 always;
    }

    # 2. Finance Backend Admin & Docs
    location ~ ^/(admin|api/schema|api/docs)/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host localhost;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. HR Backend pages (server-rendered templates & internal tools)
    location ~ ^/(employees|attendance|leaves|payroll|performance|recruitment|auth|internal|superadmin|dashboard)/ {
        proxy_pass http://hr_backend;
        proxy_set_header Host localhost;             # HR dev resolves tenant from session user
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Strip DENY to allow embedding in the unified React AppShell
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy
            "frame-ancestors 'self' http://localhost:8080 http://127.0.0.1:8080" always;
    }

    # 4. Single Frontend SPA
    location / {
        proxy_pass http://spa;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # vite HMR websocket
        proxy_set_header Connection "upgrade";
    }
}
