# ─────────────────────────────────────────────────────────────────────────
# Saptta PRODUCTION front door — TLS, built SPA served statically, APIs proxied.
#
# DNS records required (all pointing to this server's IP):
#   saptta.com          A  <server-ip>
#   app.saptta.com      A  <server-ip>
#   hr.saptta.com       A  <server-ip>
#
# TLS: certbot cert covers these hosts.
# ─────────────────────────────────────────────────────────────────────────

upstream fin_backend  { server fin-backend:8000; }
upstream hr_backend   { server hr-backend:8000; }
upstream finance_web  { server finance-web:80; }

server_names_hash_bucket_size 128;

# ── HTTP → HTTPS redirect (all hosts) + ACME challenge passthrough ────────
server {
    listen 80 default_server;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── HR host: hr.saptta.com → HR backend ──────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name hr.saptta.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://hr_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy
            "frame-ancestors 'self' https://app.saptta.com" always;
    }
}

# ── App host: app.saptta.com + saptta.com → Marketing SPA + public API ────
server {
    listen 443 ssl;
    http2 on;
    server_name app.saptta.com saptta.com www.saptta.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.unsplash.com https://images.unsplash.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com; object-src 'none';" always;

    client_max_body_size 25m;
    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host app.saptta.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location ~ ^/(admin|api/schema|api/docs)/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host app.saptta.com;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / { try_files $uri /index.html; }
}

# ── Wildcard Tenant host: *.saptta.com → Finance Frontend + Tenant API ─────
server {
    listen 443 ssl;
    http2 on;
    server_name *.saptta.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.unsplash.com https://images.unsplash.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com; object-src 'none';" always;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://finance_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
