# ─────────────────────────────────────────────────────────────────────────
# Saptta PRODUCTION front door — TLS, built SPA served statically, APIs proxied.
#
# Replace `saptta.example.com` with your real domain everywhere below, and
# point DNS:  app.<domain>, *.<domain> (wildcard for tenant workspaces),
# hr.<domain>  → this server.
#
# TLS certs: mount Let's Encrypt (certbot) or your CA cert/key at the paths in
# `ssl_certificate` / `ssl_certificate_key` (see docker-compose.prod.yml volume).
# ─────────────────────────────────────────────────────────────────────────

upstream fin_backend { server fin-backend:8000; }
upstream hr_backend  { server hr-backend:8000; }

server_names_hash_bucket_size 64;

# ── HTTP → HTTPS redirect (all hosts) + ACME challenge passthrough ────────
server {
    listen 80 default_server;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── HR host: hr.<domain> → HR backend ────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name hr.saptta.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://hr_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;       # so Django knows it's TLS
        # Allow the app host to embed HR (HR ships X-Frame-Options: DENY).
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy
            "frame-ancestors 'self' https://app.saptta.example.com https://*.saptta.example.com" always;
    }
}

# ── Tenant host: {workspace}.<domain> → FIN tenant schema + SPA ──────────
server {
    listen 443 ssl;
    http2 on;
    server_name ~^(?<workspace>[a-z0-9-]+)\.saptta\.example\.com$;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 25m;
    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host $host;                     # tenant subdomain → schema
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location ~ ^/(admin|api/schema|api/docs)/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
    location / { try_files $uri /index.html; }           # SPA history fallback
}

# ── App host: app.<domain> → SPA + FIN public API (auth/saas) ────────────
server {
    listen 443 ssl;
    http2 on;
    server_name app.saptta.example.com saptta.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 25m;
    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host app.saptta.example.com;    # public schema
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location ~ ^/(admin|api/schema|api/docs)/ {
        proxy_pass http://fin_backend;
        proxy_set_header Host app.saptta.example.com;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /assets/ {                                   # hashed → cache hard
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / { try_files $uri /index.html; }
}
