# ─────────────────────────────────────────────────────────────────────────
# Saptta COOLIFY stack. Differs from docker-compose.prod.yml by:
#   - frontdoor uses Dockerfile.coolify (no SSL, HTTP only)
#   - no certbot-webroot volume or TLS mounts
#   - relies on Coolify for TLS termination
# ─────────────────────────────────────────────────────────────────────────
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  fin-backend:
    build:
      context: ./apps/finance/backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_SECRET_KEY: ${FIN_SECRET_KEY}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      EMAIL_BACKEND: ${EMAIL_BACKEND}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-True}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      HR_INTERNAL_BASE_URL: http://hr-backend:8000
      SENTRY_DSN: ${FIN_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: >
      sh -c "python manage.py migrate_schemas --shared --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000
             --workers 4 --timeout 120 --access-logfile -"

  fin-worker:
    build:
      context: ./apps/finance/backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_SECRET_KEY: ${FIN_SECRET_KEY}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      EMAIL_BACKEND: ${EMAIL_BACKEND}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      SENTRY_DSN: ${FIN_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - ${BACKUP_DIR:-./backups}:/backups
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: celery -A config worker -B -l info

  hr-backend:
    build:
      context: ./apps/hr
      dockerfile: Dockerfile
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: hrms.settings.production
      SECRET_KEY: ${HR_SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${HR_ALLOWED_HOSTS}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      FIELD_ENCRYPTION_KEY: ${HR_FIELD_ENCRYPTION_KEY}
      SUPERADMIN_DOMAIN: ${HR_SUPERADMIN_DOMAIN}
      TENANT_DOMAIN: ${HR_TENANT_DOMAIN}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      SENTRY_DSN: ${HR_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn hrms.wsgi:application --bind 0.0.0.0:8000
             --workers 4 --timeout 120 --access-logfile -"

  finance-web:
    build:
      context: ./apps/finance/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_FINANCE_API_BASE_URL:-/api/v1}
        VITE_PLATFORM_BASE_URL: ${VITE_PLATFORM_BASE_URL:-https://app.saptta.com}
    restart: always

  frontdoor:
    build:
      context: .
      dockerfile: deploy/Dockerfile.coolify
      args:
        VITE_PLATFORM_API_BASE_URL: ${VITE_PLATFORM_API_BASE_URL}
        VITE_TENANT_API_BASE_URL: ${VITE_TENANT_API_BASE_URL}
        VITE_HR_BASE_URL: ${VITE_HR_BASE_URL}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - fin-backend
      - hr-backend
      - finance-web

volumes:
  pgdata:
